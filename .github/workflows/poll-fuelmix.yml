name: Poll fuel mix

# EirGrid's fuel-mix feed has no history — this builds it. Runs in the cloud so
# the log stays gapless regardless of whether any laptop is awake.
# GitHub delays scheduled runs under load, so real cadence is ~15-30 min.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: poll-fuelmix
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install certifi
      - name: Poll fuel-mix snapshot
        run: python3 etl/build_dataset.py --log-fuelmix
      - name: Commit the updated log
        run: |
          git config user.name "fuelmix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add app/data/fuelmix_log.json
          git diff --staged --quiet || git commit -m "fuelmix log $(date -u +%FT%TZ)"
          git push
